<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unprofessional Variety Show</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  overflow: hidden;
  background: #1a0a1e;
  font-family: 'DM Sans', sans-serif;
  color: #fff;
  user-select: none;
  -webkit-user-select: none;
}

.table {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 50%, #2d1233 0%, #1a0a1e 70%, #0d050f 100%);
}

/* ── card ── */
.card {
  position: absolute;
  width: 300px;
  height: 400px;
  border-radius: 16px;
  overflow: hidden;
  cursor: grab;
  box-shadow: 0 8px 32px rgba(0,0,0,.45);
  transition: box-shadow .25s, opacity .35s;
  will-change: transform;
  display: flex;
  flex-direction: column;
  background: #1e1e2a;
}
.card:active { cursor: grabbing; }
.card.dragging {
  z-index: 9999 !important;
  box-shadow: 0 24px 64px rgba(0,0,0,.6);
}
.card.dimmed { opacity: .18; pointer-events: none; }

.card-visual {
  flex: 1;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-visual img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  pointer-events: none;
}
.card-visual .collage {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  width: 100%;
  height: 100%;
  gap: 2px;
}
.card-visual .collage img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.card-visual .quote-mark {
  font-size: 160px;
  line-height: 1;
  color: rgba(255,255,255,.25);
  font-family: Georgia, serif;
  margin-top: -20px;
}

.card-info {
  padding: 14px 16px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: rgba(0,0,0,.45);
  min-height: 90px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.card-type {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: rgba(255,255,255,.5);
  margin-bottom: 4px;
}
.card-name {
  font-family: 'Caveat', cursive;
  font-size: 24px;
  line-height: 1.15;
  margin-bottom: 4px;
  color: #fff;
}
.card-detail {
  font-size: 12px;
  line-height: 1.4;
  color: rgba(255,255,255,.6);
  text-align: justify;
  text-align-last: left;
}

/* ── fullscreen ── */
.card.fullscreen {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  border-radius: 0 !important;
  z-index: 10000 !important;
  cursor: default !important;
  transform: none !important;
  box-shadow: none !important;
  flex-direction: column;
  overflow: hidden;
}
.card.fullscreen .card-visual { display: none; }
.card.fullscreen .card-info { display: none; }
.card.fullscreen .fs-content { display: flex; }

.fs-content {
  display: none;
  flex-direction: column;
  width: 100%;
  height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: #1a0a1e;
}

.fs-header {
  position: relative;
  width: 100%;
  min-height: 280px;
  max-height: 45vh;
  overflow: hidden;
  flex-shrink: 0;
}
.fs-header img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.fs-header-gradient {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(transparent, #1a0a1e);
}
.fs-header-overlay {
  position: absolute;
  bottom: 20px; left: 24px; right: 60px;
  z-index: 2;
}
.fs-header-overlay .fs-title {
  font-family: 'Caveat', cursive;
  font-size: 42px;
  line-height: 1.1;
  color: #fff;
  text-shadow: 0 2px 16px rgba(0,0,0,.6);
}
.fs-header-overlay .fs-subtitle {
  font-size: 14px;
  color: rgba(255,255,255,.7);
  margin-top: 6px;
}

.fs-body {
  padding: 24px;
  flex: 1;
}
.fs-body h3 {
  font-family: 'Caveat', cursive;
  font-size: 26px;
  margin-bottom: 16px;
  color: #e8d0f0;
}
.fs-body p, .fs-body li {
  font-size: 14px;
  line-height: 1.65;
  color: rgba(255,255,255,.75);
  text-align: justify;
  text-align-last: left;
}

.performer-card {
  background: rgba(255,255,255,.06);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}
.performer-card .perf-name {
  font-family: 'Caveat', cursive;
  font-size: 22px;
  color: #fff;
  margin-bottom: 2px;
}
.performer-card .perf-ig {
  font-size: 12px;
  color: rgba(255,255,255,.4);
  margin-bottom: 8px;
}
.performer-card .perf-bio {
  font-size: 13px;
  line-height: 1.6;
  color: rgba(255,255,255,.65);
  text-align: justify;
  text-align-last: left;
}

.recap-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
  margin-top: 12px;
}
.recap-grid img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  border-radius: 8px;
  display: block;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
  margin-top: 12px;
}
.gallery-grid img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  border-radius: 8px;
  display: block;
}

.ticket-btn {
  display: inline-block;
  margin-top: 16px;
  padding: 12px 28px;
  background: #9b30ff;
  color: #fff;
  border-radius: 999px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 14px;
  text-decoration: none;
  text-align: center;
  transition: background .2s;
}
.ticket-btn:hover { background: #b060ff; }

.gallery-link {
  display: inline-block;
  margin-top: 16px;
  color: #c090e0;
  font-size: 14px;
  text-decoration: underline;
}

.fs-close {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 10001;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: #fff;
  font-size: 22px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.fs-close.visible { display: flex; }

.info-block {
  background: rgba(255,255,255,.06);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}
.info-block a {
  color: #c090e0;
  text-decoration: underline;
}
.info-block p {
  margin-bottom: 8px;
}
.info-block p:last-child { margin-bottom: 0; }
</style>
</head>
<body>

<div class="table" id="table"></div>
<button class="fs-close" id="fsClose">&times;</button>

<script>
(function(){

/* ── state ── */
let shows = [], media = [], settings = {};
let cards = [];
let dragging = null, dragOffX = 0, dragOffY = 0;
let velX = 0, velY = 0, lastX = 0, lastY = 0, lastT = 0;
let fsCard = null;
let topZ = 1;
const FRICTION = 0.92;
const table = document.getElementById('table');
const closeBtn = document.getElementById('fsClose');

/* ── load data ── */
Promise.all([
  fetch('content/shows.json').then(r => r.json()),
  fetch('content/media.json').then(r => r.json()),
  fetch('content/settings.json').then(r => r.json())
]).then(([s, m, st]) => {
  shows = s;
  media = m;
  settings = st;
  buildCards();
  scatter();
}).catch(err => console.error('Failed to load content:', err));

/* ── helpers ── */
function fmtDate(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function gradientForIndex(i) {
  const palettes = [
    'linear-gradient(135deg, #2d1b4e, #4a1942)',
    'linear-gradient(135deg, #1b2d4e, #19424a)',
    'linear-gradient(135deg, #4e1b2d, #42194a)',
    'linear-gradient(135deg, #1b4e2d, #194a42)',
    'linear-gradient(135deg, #4e2d1b, #4a4219)',
    'linear-gradient(135deg, #3a1b4e, #4a1930)',
    'linear-gradient(135deg, #1b3a4e, #194a30)',
  ];
  return palettes[i % palettes.length];
}

/* ── build ── */
function buildCards() {
  /* intro card */
  addCard({
    type: 'intro',
    cardType: 'The Show',
    cardName: settings.siteName || 'Unprofessional Variety Show',
    cardDetail: settings.tagline || '',
    visualHTML: `<img src="img/profile.jpg" alt="UPVS">`,
    bgGradient: 'linear-gradient(135deg, #3a1045, #1a0a1e)',
    fsBuilder: buildIntroFS
  });

  /* show cards */
  shows.forEach((show, i) => {
    const performers = (show.performers || []).map(p => p.name).join(', ');
    let visualHTML;
    if (show.posterImage) {
      visualHTML = `<img src="${show.posterImage}" alt="${show.title}">`;
    } else {
      visualHTML = '';
    }
    addCard({
      type: 'show',
      show: show,
      cardType: fmtDate(show.date),
      cardName: show.title,
      cardDetail: performers,
      visualHTML: visualHTML,
      bgGradient: gradientForIndex(i),
      fsBuilder: buildShowFS
    });
  });

  /* gallery card */
  const photos = media.filter(m => m.type === 'photo').slice(0, 4);
  let collageHTML = '<div class="collage">';
  photos.forEach(p => { collageHTML += `<img src="${p.src}" alt="">`; });
  collageHTML += '</div>';
  addCard({
    type: 'gallery',
    cardType: 'Archive',
    cardName: 'Gallery',
    cardDetail: media.length + ' photos and videos from the archive',
    visualHTML: collageHTML,
    bgGradient: 'linear-gradient(135deg, #0d0d1a, #1a1a2e)',
    fsBuilder: buildGalleryFS
  });

  /* get involved card */
  addCard({
    type: 'involved',
    cardType: 'Join Us',
    cardName: 'Get Involved',
    cardDetail: (settings.venue || '') + ' // @unprofessionalvarietyshow',
    visualHTML: '<div style="font-size:80px;color:rgba(255,255,255,.2);">&#9733;</div>',
    bgGradient: 'linear-gradient(135deg, #0a2e1a, #1a4e2d)',
    fsBuilder: buildInvolvedFS
  });

  /* quote card */
  addCard({
    type: 'quote',
    cardType: 'Quote',
    cardName: '"One of few shows that features truly intergenerational programming"',
    cardDetail: '-- Maya Suess, via EV Grieve',
    visualHTML: '<div class="quote-mark">&ldquo;</div>',
    bgGradient: 'linear-gradient(135deg, #2d1045, #1a0a2e)',
    fsBuilder: null
  });
}

function addCard(data) {
  const el = document.createElement('div');
  el.className = 'card';
  el.style.background = data.bgGradient;

  el.innerHTML = `
    <div class="card-visual">${data.visualHTML}</div>
    <div class="card-info">
      <div class="card-type">${data.cardType}</div>
      <div class="card-name">${data.cardName}</div>
      <div class="card-detail">${data.cardDetail}</div>
    </div>
    <div class="fs-content"></div>
  `;

  table.appendChild(el);

  const cardObj = {
    el: el,
    data: data,
    x: 0, y: 0, rot: 0,
    vx: 0, vy: 0, vr: 0,
    savedX: 0, savedY: 0, savedRot: 0
  };
  cards.push(cardObj);

  /* events */
  el.addEventListener('mousedown', e => startDrag(e, cardObj));
  el.addEventListener('touchstart', e => startDrag(e, cardObj), { passive: false });
  el.addEventListener('dblclick', e => openFullscreen(cardObj));
}

/* ── scatter ── */
function scatter() {
  const W = window.innerWidth, H = window.innerHeight;
  const cw = 300, ch = 400;
  const pad = 40;
  cards.forEach(c => {
    c.x = pad + Math.random() * (W - cw - pad * 2);
    c.y = pad + Math.random() * (H - ch - pad * 2);
    c.rot = (Math.random() - 0.5) * 30;
    c.vx = 0; c.vy = 0; c.vr = 0;
    applyTransform(c);
    c.el.style.zIndex = topZ++;
  });
}

function applyTransform(c) {
  c.el.style.transform = `translate(${c.x}px, ${c.y}px) rotate(${c.rot}deg)`;
}

/* ── drag ── */
function startDrag(e, card) {
  if (fsCard) return;
  e.preventDefault();
  dragging = card;
  card.el.classList.add('dragging');
  card.el.style.zIndex = topZ++;
  card.vx = 0; card.vy = 0; card.vr = 0;

  const pt = e.touches ? e.touches[0] : e;
  dragOffX = pt.clientX - card.x;
  dragOffY = pt.clientY - card.y;
  lastX = pt.clientX;
  lastY = pt.clientY;
  velX = 0; velY = 0;
  lastT = performance.now();
}

function onMove(e) {
  if (!dragging) return;
  e.preventDefault();
  const pt = e.touches ? e.touches[0] : e;
  const now = performance.now();
  const dt = Math.max(now - lastT, 1);

  const dx = pt.clientX - lastX;
  const dy = pt.clientY - lastY;
  velX = dx / dt * 16;
  velY = dy / dt * 16;

  dragging.x = pt.clientX - dragOffX;
  dragging.y = pt.clientY - dragOffY;

  /* tilt based on horizontal velocity */
  const tilt = Math.max(-25, Math.min(25, velX * 2));
  dragging.rot = tilt;

  applyTransform(dragging);
  lastX = pt.clientX;
  lastY = pt.clientY;
  lastT = now;
}

function onUp(e) {
  if (!dragging) return;
  dragging.el.classList.remove('dragging');
  dragging.vx = velX;
  dragging.vy = velY;
  dragging.vr = velX * 0.3;
  dragging = null;
}

document.addEventListener('mousemove', onMove);
document.addEventListener('mouseup', onUp);
document.addEventListener('touchmove', onMove, { passive: false });
document.addEventListener('touchend', onUp);

/* ── physics loop ── */
function tick() {
  const W = window.innerWidth, H = window.innerHeight;
  cards.forEach(c => {
    if (c === dragging || c.el.classList.contains('fullscreen')) return;
    if (Math.abs(c.vx) < 0.01 && Math.abs(c.vy) < 0.01 && Math.abs(c.vr) < 0.01) return;

    c.x += c.vx;
    c.y += c.vy;
    c.rot += c.vr;
    c.vx *= FRICTION;
    c.vy *= FRICTION;
    c.vr *= FRICTION;

    /* bounce off edges */
    if (c.x < -100) { c.x = -100; c.vx *= -0.5; }
    if (c.x > W - 200) { c.x = W - 200; c.vx *= -0.5; }
    if (c.y < -100) { c.y = -100; c.vy *= -0.5; }
    if (c.y > H - 300) { c.y = H - 300; c.vy *= -0.5; }

    applyTransform(c);
  });
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* ── fullscreen ── */
function openFullscreen(card) {
  if (fsCard) return;
  if (!card.data.fsBuilder) return;
  fsCard = card;

  /* save position */
  card.savedX = card.x;
  card.savedY = card.y;
  card.savedRot = card.rot;

  /* build fs content */
  const fsc = card.el.querySelector('.fs-content');
  fsc.innerHTML = '';
  card.data.fsBuilder(fsc, card.data);

  /* dim others */
  cards.forEach(c => {
    if (c !== card) c.el.classList.add('dimmed');
  });

  card.el.classList.add('fullscreen');
  closeBtn.classList.add('visible');
}

function closeFullscreen() {
  if (!fsCard) return;
  const card = fsCard;
  fsCard = null;

  card.el.classList.remove('fullscreen');
  closeBtn.classList.remove('visible');

  /* restore position */
  card.x = card.savedX;
  card.y = card.savedY;
  card.rot = card.savedRot;
  applyTransform(card);

  cards.forEach(c => c.el.classList.remove('dimmed'));
}

closeBtn.addEventListener('click', closeFullscreen);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeFullscreen(); });

/* ── FS builders ── */
function buildShowFS(container, data) {
  const show = data.show;
  let html = '';

  /* header image */
  if (show.posterImage) {
    html += `<div class="fs-header">
      <img src="${show.posterImage}" alt="${show.title}">
      <div class="fs-header-gradient"></div>
      <div class="fs-header-overlay">
        <div class="fs-title">${show.title}</div>
        <div class="fs-subtitle">#${show.edition} / ${fmtDate(show.date)} / ${settings.venue || ''}</div>
      </div>
    </div>`;
  } else {
    html += `<div style="padding:60px 24px 20px;">
      <div class="fs-title" style="font-family:Caveat,cursive;font-size:42px;">${show.title}</div>
      <div class="fs-subtitle" style="font-size:14px;color:rgba(255,255,255,.6);margin-top:6px;">#${show.edition} / ${fmtDate(show.date)} / ${settings.venue || ''}</div>
    </div>`;
  }

  html += '<div class="fs-body">';

  if (show.theme) {
    html += `<p style="font-style:italic;margin-bottom:20px;color:#e8d0f0;">${show.theme}</p>`;
  }
  if (show.description && show.description !== show.theme) {
    html += `<p style="margin-bottom:20px;">${show.description}</p>`;
  }

  /* ticket button */
  if (show.ticketUrl) {
    html += `<a href="${show.ticketUrl}" target="_blank" class="ticket-btn">Get Tickets</a><br><br>`;
  }

  /* performers */
  const allPerformers = [...(show.performers || []), ...(show.specialGuests || [])];
  if (allPerformers.length) {
    html += '<h3>Performers</h3>';
    allPerformers.forEach(p => {
      html += `<div class="performer-card">
        <div class="perf-name">${p.name}</div>
        ${p.instagram ? `<div class="perf-ig">${p.instagram}</div>` : ''}
        ${p.bio ? `<p class="perf-bio">${p.bio}</p>` : ''}
      </div>`;
    });
  }

  /* accompaniment / emcee / dj */
  if (show.accompaniment) {
    html += `<p style="margin:12px 0;color:rgba(255,255,255,.5);font-size:13px;">Accompaniment: ${show.accompaniment}</p>`;
  }
  if (show.dj) {
    html += `<p style="margin:4px 0;color:rgba(255,255,255,.5);font-size:13px;">DJ: ${show.dj}</p>`;
  }

  /* recap images */
  if (show.recapImages && show.recapImages.length) {
    html += '<h3 style="margin-top:24px;">Recap</h3>';
    if (show.recapCaption) {
      html += `<p style="margin-bottom:12px;">${show.recapCaption}</p>`;
    }
    html += '<div class="recap-grid">';
    show.recapImages.forEach(src => {
      html += `<img src="${src}" alt="" loading="lazy">`;
    });
    html += '</div>';
  }

  html += '</div>';
  container.innerHTML = html;
}

function buildIntroFS(container, data) {
  let html = `<div class="fs-header">
    <img src="img/profile.jpg" alt="UPVS">
    <div class="fs-header-gradient"></div>
    <div class="fs-header-overlay">
      <div class="fs-title">${settings.siteName || 'Unprofessional Variety Show'}</div>
      <div class="fs-subtitle">${settings.tagline || ''}</div>
    </div>
  </div>
  <div class="fs-body">
    <p style="margin-bottom:20px;">${settings.aboutText || ''}</p>
    <h3>${shows.length} Shows Since 2022</h3>
    <p>Hosted by Maya Suess at ${settings.venue || 'The Parkside Lounge'}, ${settings.venueAddress || ''}.</p>`;

  if (settings.pressLinks && settings.pressLinks.length) {
    html += '<h3 style="margin-top:24px;">Press</h3>';
    settings.pressLinks.forEach(p => {
      html += `<div class="info-block"><a href="${p.url}" target="_blank">${p.title}</a><br><span style="font-size:12px;color:rgba(255,255,255,.4);">${p.date}</span></div>`;
    });
  }

  html += '</div>';
  container.innerHTML = html;
}

function buildGalleryFS(container, data) {
  const photos = media.filter(m => m.type === 'photo').slice(0, 24);
  let html = `<div style="padding:60px 24px 20px;">
    <div class="fs-title" style="font-family:Caveat,cursive;font-size:42px;">Gallery</div>
    <div class="fs-subtitle" style="font-size:14px;color:rgba(255,255,255,.6);margin-top:6px;">${media.length} photos and videos from the archive</div>
  </div>
  <div class="fs-body">
    <div class="gallery-grid">`;
  photos.forEach(p => {
    html += `<img src="${p.src}" alt="" loading="lazy">`;
  });
  html += `</div>
    <a href="index.html" class="gallery-link">View full gallery at index.html</a>
  </div>`;
  container.innerHTML = html;
}

function buildInvolvedFS(container, data) {
  let html = `<div style="padding:60px 24px 20px;">
    <div class="fs-title" style="font-family:Caveat,cursive;font-size:42px;">Get Involved</div>
  </div>
  <div class="fs-body">
    <div class="info-block">
      <p><strong>Venue</strong></p>
      <p>${settings.venue || ''}</p>
      <p>${settings.venueAddress || ''}</p>
      ${settings.parksideUrl ? `<p><a href="${settings.parksideUrl}" target="_blank">Visit venue website</a></p>` : ''}
    </div>
    <div class="info-block">
      <p><strong>Follow</strong></p>
      ${settings.instagramShow ? `<p><a href="${settings.instagramShow}" target="_blank">@unprofessionalvarietyshow</a></p>` : ''}
      ${settings.instagramMaya ? `<p><a href="${settings.instagramMaya}" target="_blank">@MayaSuess</a></p>` : ''}
    </div>
    <div class="info-block">
      <p><strong>Tickets</strong></p>
      ${settings.ticketPlatform ? `<p><a href="${settings.ticketPlatform}" target="_blank">Get tickets on Humanitix</a></p>` : ''}
    </div>`;

  if (settings.accessibilityNote) {
    html += `<div class="info-block">
      <p><strong>Accessibility</strong></p>
      <p>${settings.accessibilityNote}</p>
    </div>`;
  }

  html += '</div>';
  container.innerHTML = html;
}

/* ── resize ── */
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (!fsCard) scatter();
  }, 300);
});

})();
</script>
</body>
</html>
