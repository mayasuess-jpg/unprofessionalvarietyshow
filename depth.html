<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unprofessional Variety Show</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100%;
        }

        .stage {
            position: fixed;
            inset: 0;
            perspective: 1000px;
            perspective-origin: 50% 40%;
            overflow: hidden;
        }

        .card {
            position: absolute;
            inset: 0;
            will-change: transform;
            transform-style: preserve-3d;
        }

        /* Card header */
        .card-header {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 72px;
            border-radius: 18px 18px 0 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 36px;
            z-index: 2;
        }

        .card-header-tag {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.5;
            font-family: 'DM Sans', sans-serif;
        }

        /* Card body */
        .card-body {
            position: absolute;
            top: 72px; left: 0; right: 0; bottom: 0;
            overflow-y: auto;
            z-index: 1;
        }

        .card-inner {
            width: 100%;
            padding: 50px 60px 80px;
        }

        /* Typography */
        .card-title {
            font-family: 'Caveat', cursive;
            font-size: clamp(2rem, 5vw, 3.6rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 12px;
        }

        .card-subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.95rem;
            opacity: 0.5;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        /* Hero image */
        .ph-hero {
            width: 100%;
            height: 280px;
            border-radius: 14px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.35;
            overflow: hidden;
            position: relative;
        }

        .ph-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 14px;
            opacity: 1;
        }

        .ph-row {
            display: flex;
            gap: 14px;
            margin-bottom: 28px;
        }

        .ph-box {
            flex: 1;
            height: 130px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.3;
            overflow: hidden;
        }

        .ph-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ph-box.tall { height: 180px; }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
            font-family: 'DM Sans', sans-serif;
            text-decoration: none;
        }

        .btn-primary {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }

        .btn-primary:hover {
            background: rgba(255,255,255,0.25);
        }

        .btn-outline {
            background: transparent;
            color: rgba(255,255,255,0.6);
            border: 1.5px solid rgba(255,255,255,0.2);
        }

        .btn-outline:hover {
            border-color: rgba(255,255,255,0.4);
            color: rgba(255,255,255,0.8);
        }

        /* Detail list */
        .detail-list {
            list-style: none;
            margin-bottom: 28px;
        }

        .detail-list li {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 0.85rem;
            opacity: 0.7;
            display: flex;
            justify-content: space-between;
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }

        .detail-list li span {
            opacity: 0.5;
            font-style: normal;
            font-family: 'DM Sans', sans-serif;
        }

        /* Quote card */
        .quote-mark {
            font-size: 6rem;
            line-height: 1;
            opacity: 0.15;
            margin-bottom: -20px;
            font-family: 'Playfair Display', serif;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.6rem, 4vw, 2.8rem);
            font-weight: 400;
            font-style: italic;
            line-height: 1.25;
            margin-bottom: 16px;
        }

        .quote-context {
            font-size: 0.85rem;
            opacity: 0.4;
            font-style: italic;
            font-family: 'Playfair Display', serif;
        }

        /* Tags row */
        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .tag-pill {
            padding: 5px 14px;
            border-radius: 50px;
            font-size: 0.65rem;
            border: 1px solid rgba(255,255,255,0.15);
            opacity: 0.5;
            font-family: 'DM Sans', sans-serif;
        }

        /* Section divider */
        .section-gap { height: 28px; }

        /* Body text */
        .body-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.9rem;
            line-height: 1.6;
            opacity: 0.6;
            margin-bottom: 24px;
            text-align: justify;
            text-align-last: left;
        }

        /* HUD */
        .hud {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 9999;
        }

        .hud-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .hud-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            border: 2px solid rgba(255,255,255,0.08);
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s;
            flex-shrink: 0;
        }

        .hud-dot.active {
            background: rgba(255,255,255,0.6);
            border-color: rgba(255,255,255,0.25);
        }

        .hud-dot:hover { background: rgba(255,255,255,0.35); }

        .hud-label {
            position: absolute;
            right: 36px;
            white-space: nowrap;
            font-size: 0.7rem;
            letter-spacing: 0.04em;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 6px;
            opacity: 0;
            pointer-events: none;
            transform: translateX(4px);
            transition: opacity 0.2s, transform 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .hud-item:hover .hud-label {
            opacity: 1;
            transform: translateX(0);
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .scroll-indicator.visible {
            opacity: 1;
        }

        .scroll-indicator-text {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            opacity: 0.35;
            font-family: 'DM Sans', sans-serif;
        }

        .scroll-indicator-mouse {
            width: 22px;
            height: 36px;
            border: 1.5px solid rgba(255,255,255,0.25);
            border-radius: 11px;
            position: relative;
            opacity: 0.4;
        }

        .scroll-indicator-mouse::after {
            content: '';
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            animation: mouse-hint 2s ease infinite;
        }

        @keyframes mouse-hint {
            0%, 100% { bottom: 6px; opacity: 0.6; }
            50% { bottom: 18px; opacity: 1; }
        }

        .scroll-indicator-arrow {
            opacity: 0.25;
            font-size: 0.8rem;
            animation: bob 1.8s ease infinite;
        }

        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(4px); }
        }

        /* Lure orb */
        .lure-orb {
            position: fixed;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff6baa, #a835e0 60%, transparent 100%);
            box-shadow: 0 0 16px rgba(232,74,138,0.7), 0 0 40px rgba(168,53,224,0.4), 0 0 80px rgba(232,74,138,0.2);
            z-index: 9999;
            pointer-events: auto;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.6s;
            animation: orbPulse 1.8s ease-in-out infinite;
        }

        @keyframes orbPulse {
            0%, 100% { box-shadow: 0 0 16px rgba(232,74,138,0.7), 0 0 40px rgba(168,53,224,0.4), 0 0 80px rgba(232,74,138,0.2); transform: scale(1); }
            50% { box-shadow: 0 0 24px rgba(232,74,138,0.9), 0 0 60px rgba(168,53,224,0.6), 0 0 100px rgba(232,74,138,0.3); transform: scale(1.2); }
        }

        .lure-orb.visible {
            opacity: 1;
        }

        .lure-orb.caught {
            opacity: 0;
            transform: scale(3) !important;
            animation: none;
            transition: opacity 0.3s, transform 0.3s;
        }

        /* Section heading inside cards */
        .section-title {
            font-family: 'Caveat', cursive;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 14px;
            margin-top: 8px;
            opacity: 0.8;
        }

        /* Testimonial block */
        .testimonial {
            border-left: 2px solid rgba(255,255,255,0.15);
            padding: 14px 0 14px 20px;
            margin-bottom: 20px;
        }

        .testimonial-text {
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem;
            font-style: italic;
            opacity: 0.55;
            line-height: 1.5;
            margin-bottom: 6px;
            text-align: justify;
            text-align-last: left;
        }

        .testimonial-author {
            font-size: 0.7rem;
            opacity: 0.35;
            font-family: 'DM Sans', sans-serif;
        }

        /* Divider line */
        .divider {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin: 32px 0;
        }

        /* Grid for features/items */
        .feature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 28px;
        }

        .feature-card {
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 18px;
        }

        .feature-card-title {
            font-family: 'Caveat', cursive;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 6px;
            opacity: 0.7;
        }

        .feature-card-desc {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.7rem;
            opacity: 0.4;
            line-height: 1.4;
        }

        /* Schedule block */
        .schedule-block {
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 14px;
        }

        .schedule-time {
            font-size: 0.7rem;
            opacity: 0.4;
            margin-bottom: 4px;
            font-family: 'DM Sans', sans-serif;
        }

        .schedule-title {
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0.7;
            font-family: 'DM Sans', sans-serif;
        }

        /* Price tag */
        .price {
            font-family: 'Caveat', cursive;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .price-note {
            font-size: 0.75rem;
            opacity: 0.4;
            margin-bottom: 24px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }

        /* Performer pills */
        .performer-pills {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }

        .performer-pill {
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px 20px;
        }

        .performer-pill-name {
            font-family: 'Caveat', cursive;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .performer-pill-ig {
            font-size: 0.65rem;
            opacity: 0.35;
            margin-bottom: 6px;
            font-family: 'DM Sans', sans-serif;
        }

        .performer-pill-bio {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.75rem;
            opacity: 0.4;
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Recap image grid */
        .recap-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 28px;
        }

        .recap-grid img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
        }

        /* Media grid */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 28px;
        }

        .media-grid img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .media-grid img:hover {
            opacity: 0.8;
        }

        /* Show date badge */
        .show-date {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            opacity: 0.45;
            margin-bottom: 8px;
        }

        /* Recap caption */
        .recap-caption {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.85rem;
            opacity: 0.5;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        /* Loading screen */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            transition: opacity 0.6s;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            font-family: 'Caveat', cursive;
            font-size: 2rem;
            opacity: 0.3;
            animation: pulse-load 1.5s ease infinite;
        }

        @keyframes pulse-load {
            0%, 100% { opacity: 0.15; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
    <div class="loading-text">Unprofessional...</div>
</div>

<div class="stage" id="stage"></div>
<div class="hud" id="hud"></div>
<div class="scroll-indicator" id="scrollIndicator">
    <div class="scroll-indicator-text">Move mouse down to scroll</div>
    <div class="scroll-indicator-mouse"></div>
    <div class="scroll-indicator-arrow">&#x2304;</div>
</div>
<div class="lure-orb" id="lureOrb"></div>

<script>
(function() {

var PH = 'rgba(255,255,255,0.08)';
var PH2 = 'rgba(255,255,255,0.06)';

// Fetch all data, then build
Promise.all([
    fetch('content/shows.json').then(function(r) { return r.json(); }),
    fetch('content/media.json').then(function(r) { return r.json(); }),
    fetch('content/settings.json').then(function(r) { return r.json(); })
]).then(function(results) {
    var shows = results[0];
    var media = results[1];
    var settings = results[2];
    buildSite(shows, media, settings);
}).catch(function(err) {
    console.error('Failed to load data:', err);
    document.getElementById('loadingScreen').innerHTML = '<div class="loading-text">Failed to load. Check console.</div>';
});

function formatDate(dateStr) {
    var d = new Date(dateStr + 'T00:00:00');
    var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function truncBio(bio, max) {
    if (!bio) return '';
    if (bio.length <= max) return escHtml(bio);
    return escHtml(bio.substring(0, max).replace(/\s+\S*$/, '')) + '...';
}

function buildPerformerPills(performers, specialGuests) {
    var html = '<div class="performer-pills">';
    var all = (performers || []).concat(specialGuests || []);
    all.forEach(function(p) {
        html += '<div class="performer-pill">';
        html += '<div class="performer-pill-name">' + escHtml(p.name) + '</div>';
        if (p.instagram) {
            html += '<div class="performer-pill-ig">' + escHtml(p.instagram) + '</div>';
        }
        if (p.bio) {
            html += '<div class="performer-pill-bio">' + escHtml(p.bio) + '</div>';
        }
        html += '</div>';
    });
    html += '</div>';
    return html;
}

function buildRecapGrid(images) {
    if (!images || images.length === 0) return '';
    var html = '<div class="recap-grid">';
    images.forEach(function(src) {
        html += '<img src="' + escHtml(src) + '" alt="Show photo" loading="lazy">';
    });
    html += '</div>';
    return html;
}

function buildShowCard(show, bg, headerBg) {
    var html = '';
    if (show.posterImage) {
        html += '<div class="ph-hero"><img src="' + escHtml(show.posterImage) + '" alt="' + escHtml(show.title) + '" loading="lazy"></div>';
    }
    html += '<div class="card-title">' + escHtml(show.title) + '</div>';
    html += '<div class="show-date">' + formatDate(show.date) + ' / ' + escHtml(show.time) + '</div>';
    if (show.theme || show.description) {
        html += '<div class="card-subtitle">' + escHtml(show.theme || show.description) + '</div>';
    }
    if (show.emcee || show.accompaniment) {
        html += '<div class="tags">';
        if (show.emcee) html += '<span class="tag-pill">Emcee: ' + escHtml(show.emcee) + '</span>';
        if (show.accompaniment) html += '<span class="tag-pill">Music: ' + escHtml(show.accompaniment) + '</span>';
        html += '</div>';
    }
    html += '<div class="divider"></div>';
    html += '<div class="section-title">Performers</div>';
    html += buildPerformerPills(show.performers, show.specialGuests);
    if (show.recapImages && show.recapImages.length > 0) {
        html += '<div class="divider"></div>';
        html += '<div class="section-title">Recap</div>';
        if (show.recapCaption) {
            html += '<div class="recap-caption">' + escHtml(show.recapCaption) + '</div>';
        }
        html += buildRecapGrid(show.recapImages);
    }
    if (show.ticketUrl) {
        html += '<a href="' + escHtml(show.ticketUrl) + '" class="btn btn-primary" target="_blank">Get Tickets</a>';
    }
    return html;
}

function buildSite(shows, media, settings) {
    var cards = [];

    // Find upcoming show or use first
    var nextShow = shows.find(function(s) { return s.isUpcoming; }) || shows[0];

    // Card 1: The Show (intro/hero)
    cards.push({
        tag: 'UNPROFESSIONAL',
        title: 'Unprofessional Variety Show',
        bg: '#1a0a1e',
        headerBg: '#2a1a2e',
        body:
            '<div class="ph-hero" style="margin:-50px -60px 40px;padding:0;position:relative;height:300px;overflow:hidden;border-radius:0">' +
                '<img src="img/profile.jpg" style="width:100%;height:100%;object-fit:cover;opacity:0.6">' +
                '<div style="position:absolute;inset:0;background:linear-gradient(transparent 40%,#1a0a1e);display:flex;align-items:flex-end;padding:30px 60px">' +
                    '<div class="card-title" style="font-size:clamp(2.4rem,6vw,4.2rem);margin:0">Unprofessional Variety Show</div>' +
                '</div>' +
            '</div>' +
            '<div class="card-subtitle">' + escHtml(settings.tagline) + '</div>' +
            '<div style="display:flex;gap:12px;margin:24px 0 32px;overflow-x:auto">' +
                shows.slice(0,6).map(function(s){return s.posterImage ? '<img src="' + escHtml(s.posterImage) + '" style="width:100px;height:100px;object-fit:cover;border-radius:8px;flex-shrink:0">' : ''}).join('') +
            '</div>' +
            '<div class="feature-grid">' +
                '<div class="feature-card"><div class="feature-card-title">Venue</div><div class="feature-card-desc">' + escHtml(settings.venue) + '<br>' + escHtml(settings.venueAddress) + '</div></div>' +
                '<div class="feature-card"><div class="feature-card-title">Emcee</div><div class="feature-card-desc">Maya Suess</div></div>' +
                '<div class="feature-card"><div class="feature-card-title">Accompaniment</div><div class="feature-card-desc">Live music every show</div></div>' +
                '<div class="feature-card"><div class="feature-card-title">The Deal</div><div class="feature-card-desc">All proceeds go directly to the performers</div></div>' +
            '</div>' +
            '<div class="divider"></div>' +
            '<div class="section-title">Venue Details</div>' +
            '<ul class="detail-list">' +
                '<li>Where <span>' + escHtml(settings.venue) + '</span></li>' +
                '<li>Address <span>' + escHtml(settings.venueAddress) + '</span></li>' +
                '<li>Frequency <span>Quarterly</span></li>' +
                '<li>Since <span>February 2022</span></li>' +
                '<li>Accessibility <span>Ground floor, portable ramp</span></li>' +
            '</ul>' +
            '<div class="divider"></div>' +
            '<div class="body-text">' + escHtml(settings.aboutText) + '</div>' +
            '<div class="testimonial"><div class="testimonial-text">"Allied Productions exemplifies one of the things I love about this neighborhood: the people here support creative, offbeat endeavors that feed the soul."</div><div class="testimonial-author">EV Grieve, Feb 2024</div></div>' +
            '<a href="' + escHtml(settings.ticketPlatform) + '" class="btn btn-primary" target="_blank">Get Tickets</a>' +
            '<a href="' + escHtml(settings.instagramShow) + '" class="btn btn-outline" target="_blank">Follow on Instagram</a>'
    });

    // Card 2: Next Show
    cards.push({
        tag: nextShow.isUpcoming ? 'NEXT SHOW' : 'LATEST SHOW',
        title: nextShow.title,
        bg: '#2b4fd8',
        headerBg: '#3b5fe8',
        body: buildShowCard(nextShow, '#2b4fd8', '#3b5fe8')
    });

    // Cards 3-6: Recent show recaps (shows index 1-4)
    var recapColors = [
        { bg: '#d42a4c', headerBg: '#e43a5c' },
        { bg: '#1a5c53', headerBg: '#237a6e' },
        { bg: '#8a6a3a', headerBg: '#9a7a4a' },
        { bg: '#5a2a4a', headerBg: '#6a3a5a' }
    ];

    for (var i = 1; i <= 4 && i < shows.length; i++) {
        var show = shows[i];
        var color = recapColors[i - 1];
        cards.push({
            tag: 'SHOW #' + show.edition,
            title: show.title,
            bg: color.bg,
            headerBg: color.headerBg,
            body: buildShowCard(show, color.bg, color.headerBg)
        });
    }

    // Card 7: Media
    var mediaPhotos = media.filter(function(m) {
        return m.type === 'photo' || m.thumbSrc;
    });
    var first12 = mediaPhotos.slice(0, 12);
    var mediaHtml = '<div class="card-title">Gallery</div>' +
        '<div class="card-subtitle">Photos from the show</div>' +
        '<div class="media-grid">';
    first12.forEach(function(m) {
        var imgSrc = m.type === 'photo' ? m.src : (m.thumbSrc || m.src);
        mediaHtml += '<img src="' + escHtml(imgSrc) + '" alt="Show photo" loading="lazy">';
    });
    mediaHtml += '</div>' +
        '<a href="index.html#media" class="btn btn-primary">View Full Gallery</a>';

    cards.push({
        tag: 'MEDIA',
        title: 'Gallery',
        bg: '#0d0510',
        headerBg: '#1a0a1e',
        body: mediaHtml
    });

    // Card 8: Maya Quote
    cards.push({
        tag: 'PRESS',
        title: 'EV Grieve',
        bg: '#1a1a1a',
        headerBg: '#2a2a2a',
        body:
            '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;text-align:center">' +
            '<div class="quote-mark">\u201C</div>' +
            '<div class="quote-text">Allied Productions exemplifies one of the things I love about this neighborhood: the people here support creative, offbeat endeavors that feed the soul.</div>' +
            '<div class="quote-context">EV Grieve, February 2024</div>' +
            '<div class="section-gap"></div>' +
            '<a href="https://evgrieve.com/2024/02/a-visit-to-unprofessional-variety-show.html" class="btn btn-outline" target="_blank">Read the Article</a>' +
            '</div>'
    });

    // Card 9: Shop
    cards.push({
        tag: 'MERCH',
        title: 'Shop',
        bg: '#d42a4c',
        headerBg: '#e43a5c',
        body:
            '<div class="card-title">Merch</div>' +
            '<div class="card-subtitle">Coming soon</div>' +
            '<div class="feature-grid">' +
                '<div class="feature-card"><div class="feature-card-title">"Unprofessional" Tee</div><div class="feature-card-desc">Hand-drawn logo on black cotton</div></div>' +
                '<div class="feature-card"><div class="feature-card-title">Show Poster Prints</div><div class="feature-card-desc">Original artwork by Maya Suess</div></div>' +
                '<div class="feature-card"><div class="feature-card-title">Sticker Pack</div><div class="feature-card-desc">Assorted show art</div></div>' +
                '<div class="feature-card"><div class="feature-card-title">"Undisciplined" Tote</div><div class="feature-card-desc">Canvas tote bag</div></div>' +
            '</div>' +
            '<div class="body-text">All merch items are coming soon. Follow us on Instagram to be the first to know when they drop.</div>' +
            '<a href="' + escHtml(settings.instagramShow) + '" class="btn btn-outline" target="_blank">Follow for Updates</a>'
    });

    // Card 10: Get Involved
    cards.push({
        tag: 'CONNECT',
        title: 'Get Involved',
        bg: '#3dcc6a',
        headerBg: '#4ddc7a',
        body:
            '<div class="card-title">Get Involved</div>' +
            '<div class="card-subtitle">The show lives because of its community</div>' +
            '<div class="divider"></div>' +
            '<div class="section-title">Want to Perform?</div>' +
            '<div class="body-text">Unprofessional welcomes performers of all disciplines. If you have something to share, we want to hear from you. Reach out on Instagram or come to a show and say hello.</div>' +
            '<div class="divider"></div>' +
            '<div class="section-title">Connect</div>' +
            '<ul class="detail-list">' +
                '<li>Show Instagram <span><a href="' + escHtml(settings.instagramShow) + '" target="_blank" style="color:inherit;text-decoration:underline">@unprofessionalvarietyshow</a></span></li>' +
                '<li>Maya <span><a href="' + escHtml(settings.instagramMaya) + '" target="_blank" style="color:inherit;text-decoration:underline">@MayaSuess</a></span></li>' +
                '<li>Venue <span><a href="' + escHtml(settings.parksideUrl) + '" target="_blank" style="color:inherit;text-decoration:underline">' + escHtml(settings.venue) + '</a></span></li>' +
                '<li>Tickets <span><a href="' + escHtml(settings.ticketPlatform) + '" target="_blank" style="color:inherit;text-decoration:underline">Humanitix</a></span></li>' +
            '</ul>' +
            '<div class="divider"></div>' +
            '<div class="section-title">Accessibility</div>' +
            '<div class="body-text">' + escHtml(settings.accessibilityNote) + '</div>' +
            '<a href="' + escHtml(settings.instagramShow) + '" class="btn btn-primary" target="_blank">Say Hello on Instagram</a>' +
            '<a href="' + escHtml(settings.ticketPlatform) + '" class="btn btn-outline" target="_blank">Get Tickets</a>'
    });

    initDepthScroll(cards);

    // Hide loading screen
    setTimeout(function() {
        document.getElementById('loadingScreen').classList.add('hidden');
    }, 300);
}

function initDepthScroll(cards) {
    var numCards = cards.length;
    var stage = document.getElementById('stage');
    var hud = document.getElementById('hud');
    var scrollIndicator = document.getElementById('scrollIndicator');
    var lureOrb = document.getElementById('lureOrb');
    var cardEls = [];
    var cardBodies = [];
    var dotEls = [];

    var DWELL = 0.4;

    // Virtual card position (0 to numCards-1). Wheel changes this.
    var vScroll = 0;
    var targetCard = null;
    var maxScroll = numCards - 1;

    // Mouse Y tracking for content scroll zone
    var mouseY = 0.5;

    // Build cards
    cards.forEach(function(c, i) {
        var el = document.createElement('div');
        el.className = 'card';
        el.style.zIndex = numCards - i;
        el.innerHTML =
            '<div class="card-header" style="background:' + c.headerBg + '">' +
                '<span class="card-header-tag">' + c.tag + '</span>' +
            '</div>' +
            '<div class="card-body" style="background:' + c.bg + '">' +
                '<div class="card-inner">' + c.body + '</div>' +
            '</div>';
        stage.appendChild(el);
        cardEls.push(el);
        cardBodies.push(el.querySelector('.card-body'));

        var item = document.createElement('div');
        item.className = 'hud-item';
        var label = document.createElement('div');
        label.className = 'hud-label';
        label.textContent = c.title;
        var dot = document.createElement('div');
        dot.className = 'hud-dot';
        (function(idx) {
            dot.addEventListener('click', function() {
                targetCard = idx;
            });
        })(i);
        item.appendChild(label);
        item.appendChild(dot);
        hud.appendChild(item);
        dotEls.push(dot);
    });

    // ---- WHEEL / SCROLL GESTURE = CHANGE CARDS ----
    var vVelocity = 0;
    var WHEEL_SENSITIVITY = 0.00006;
    var FRICTION = 0.94;
    var SNAP_STRENGTH = 0.008;
    var SNAP_DEAD_ZONE = 0.0008;
    var MAX_VELOCITY = 0.02;

    document.addEventListener('wheel', function(e) {
        e.preventDefault();
        vVelocity += e.deltaY * WHEEL_SENSITIVITY;
        if (vVelocity > MAX_VELOCITY) vVelocity = MAX_VELOCITY;
        if (vVelocity < -MAX_VELOCITY) vVelocity = -MAX_VELOCITY;
        targetCard = null;
    }, { passive: false });

    // Block native touch scroll
    document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

    // ---- MOUSE IN LOWER ZONE = SCROLL CARD CONTENT ----
    document.addEventListener('mousemove', function(e) {
        mouseY = e.clientY / window.innerHeight;
    });

    document.addEventListener('mouseleave', function() {
        mouseY = 0.5;
    });

    // ---- MAIN LOOP ----
    function tick() {
        requestAnimationFrame(tick);

        // HUD click: animate to target card
        if (targetCard !== null) {
            var diff = targetCard - vScroll;
            if (Math.abs(diff) < 0.005) {
                vScroll = targetCard;
                targetCard = null;
                vVelocity = 0;
            } else {
                vVelocity = diff * 0.08;
            }
        }

        // Apply velocity with friction
        vScroll += vVelocity;
        vVelocity *= FRICTION;

        // Very lazy snap: only when truly stopped
        if (Math.abs(vVelocity) < SNAP_DEAD_ZONE && targetCard === null) {
            var nearest = Math.round(vScroll);
            var snapDiff = nearest - vScroll;
            if (Math.abs(snapDiff) > 0.002) {
                vScroll += snapDiff * SNAP_STRENGTH;
            }
        }

        // Clamp
        if (vScroll < 0) { vScroll = 0; vVelocity = 0; }
        if (vScroll > maxScroll) { vScroll = maxScroll; vVelocity = 0; }

        var activeIndex = Math.min(Math.round(vScroll), numCards - 1);

        // Check if active card has scrollable content
        var activeBody = cardBodies[activeIndex];
        var hasMore = activeBody && (activeBody.scrollTop < (activeBody.scrollHeight - activeBody.clientHeight - 2));
        var hasScrolledDown = activeBody && activeBody.scrollTop > 5;
        var isScrollable = activeBody && (activeBody.scrollHeight > activeBody.clientHeight + 10);

        // Mouse in bottom 25%: auto-scroll DOWN
        var inScrollDown = mouseY > 0.75;
        // Mouse in top 15%: auto-scroll UP
        var inScrollUp = mouseY < 0.15 && hasScrolledDown;

        if (inScrollDown && activeBody && hasMore) {
            var intensity = (mouseY - 0.75) / 0.25;
            activeBody.scrollTop += intensity * 5;
        } else if (inScrollUp && activeBody) {
            var intensity = (0.15 - mouseY) / 0.15;
            activeBody.scrollTop -= intensity * 5;
        }

        // Show indicator when card has scrollable content
        scrollIndicator.classList.toggle('visible', isScrollable && hasMore && !inScrollDown);

        // Lure orb
        if (isScrollable && hasMore && !inScrollDown) {
            lureOrb.classList.add('visible');
            lureOrb.classList.remove('caught');
            var time = Date.now() * 0.001;
            var orbX = 50 + Math.sin(time * 0.6) * 20;
            var orbBaseY = 82 + Math.sin(time * 0.35) * 6;
            lureOrb.style.left = orbX + '%';
            lureOrb.style.top = orbBaseY + '%';
        } else if (inScrollDown && lureOrb.classList.contains('visible')) {
            lureOrb.classList.add('caught');
            setTimeout(function() { lureOrb.classList.remove('visible'); }, 300);
        } else if (!isScrollable || !hasMore) {
            lureOrb.classList.remove('visible');
            lureOrb.classList.remove('caught');
        }

        // Render card transforms
        for (var i = 0; i < numCards; i++) {
            var el = cardEls[i];
            var raw = vScroll - i;

            if (raw < -1.5 || raw > 2) {
                el.style.visibility = 'hidden';
                continue;
            }

            el.style.visibility = 'visible';

            // Reset content scroll when card is not active
            if (i !== activeIndex) {
                cardBodies[i].scrollTop = 0;
            }

            var t;
            if (raw <= 0) {
                var arriveStart = -(1 - DWELL);
                if (raw <= arriveStart) {
                    t = -1;
                } else {
                    t = -1 + (raw - arriveStart) / (1 - DWELL);
                }
            } else if (raw <= DWELL) {
                t = 0;
            } else {
                t = (raw - DWELL) / (1 - DWELL);
            }

            if (t <= 0) {
                var behindZ = t * 500;
                var behindScale = 0.7 + 0.3 * (1 + t);
                el.style.transform = 'translate3d(0, 0, ' + behindZ + 'px) scale(' + behindScale + ')';
            } else {
                var dropY = t * 120;
                var dropZ = t * 100;
                el.style.transform = 'translate3d(0, ' + dropY + 'vh, ' + dropZ + 'px)';
            }

            dotEls[i].classList.toggle('active', i === activeIndex);
        }
    }

    tick();
}

})();
</script>
